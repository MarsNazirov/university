version: '3.8'

networks:
  university-network:
    driver: bridge

services:
  postgres:
    image: postgres:15
    container_name: university_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: university
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "54321:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - university-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: university_redis
    restart: unless-stopped
    ports:
      - "63791:6379"
    volumes:
      - redis_data:/data
    networks:
      - university-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: university_php
    restart: unless-stopped
    working_dir: /var/www
    user: "1000:1000"
    environment:
      - COMPOSER_MEMORY_LIMIT=-1
    volumes:
      - ./:/var/www
    networks:
      - university-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: university_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@university.ru
      PGADMIN_DEFAULT_PASSWORD: secret
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    networks:
      - university-network
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: university_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - university-network
    depends_on:
      - php

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local